<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>sysctrl</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #eee; }
        .config { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .config label { font-weight: bold; }
        .config input, .config textarea { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: #eee; }
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        #start { background: #28a745; color: white; }
        #stop { background: #dc3545; color: white; }
        #status { margin-top: 10px; font-style: italic; }
        #log { margin-top: 20px; height: 200px; overflow-y: auto; background: #111; padding: 10px; border: 1px solid #444; font-family: monospace; font-size: 12px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .log-agent { color: #007bff; }
        .log-action { color: #ffc107; }
        .log-error { color: #f44336; }
    </style>
</head>
<body>
    <h1>sysctrl</h1>

    <div class="config">
        <label>Ollama Host URL:</label>
        <input type="text" id="ollama-url" value="http://localhost:11434">

        <label>Model Name:</label>
        <input type="text" id="model-name" value="Etron:latest">

        <label>Task Description:</label>
        <textarea id="task-desc" rows="3" placeholder="e.g., Open browser and search for 'latest news'"></textarea>
    </div>

    <div class="controls">
        <button id="start">Start Agent</button>
        <button id="stop" disabled>Stop Agent</button>
    </div>

    <div id="status">Status: Idle</div>

    <div id="log"></div>

    <script src="renderer.js"></script>
</body>
</html>
